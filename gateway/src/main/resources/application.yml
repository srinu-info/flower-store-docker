spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://auth:8081
          predicates:
            - Path=/auth/**

        - id: product-service
          uri: http://product:8082
          predicates:
            - Path=/products,/products/**,/admin/**

        - id: cart-service
          uri: http://cart:8083
          predicates:
            - Path=/cart,/cart/**

        - id: order-service
          uri: http://order:8084
          predicates:
            - Path=/orders,/orders/**

        - id: feedback-service
          uri: http://feedback:8085
          predicates:
            - Path=/feedback,/feedback/**