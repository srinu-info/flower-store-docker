spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products,/products/**,/admin/**

        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/cart,/cart/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/orders,/orders/**

        - id: feedback-service
          uri: http://localhost:8085
          predicates:
            - Path=/feedback,/feedback/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true