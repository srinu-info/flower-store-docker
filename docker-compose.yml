networks:
  default:
    driver: bridge
    name: store

services:
  api-gateway:
    image: devopsrinu/api-gateway:v1
    container_name: api-gateway
    ports:
      - "8080:8080"

  auth-service:
    image: devopsrinu/auth-service:v1
    container_name: auth-service
    ports:
      - "8081:8081"

  product-service:
    image: devopsrinu/product-service:v1
    container_name: product-service
    ports:
      - "8082:8082"

  cart-service:
    image: devopsrinu/cart-service:v1
    container_name: cart-service
    ports:
      - "8083:8083"

  order-service:
    image: devopsrinu/order-service:v1
    container_name: order-service
    ports:
      - "8084:8084"

  feedback-service:
    image: devopsrinu/feedback-service:v1
    container_name: feedback-service
    ports:
      - "8085:8085"
  
  frontend:
    image: devopsrinu/frontend:v1
    container_name: frontend
    ports:
      - "4200:4200"