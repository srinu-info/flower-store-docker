<div class="container mt-5">

  <div class="card p-4">

    <h3>Change Password</h3>

    <div class="mb-3">

      <label class="form-label">
        Old Password
      </label>

      <input
        type="password"
        class="form-control"
        [(ngModel)]="oldPassword">

    </div>

    <div class="mb-3">

      <label class="form-label">
        New Password
      </label>

      <input
        type="password"
        class="form-control"
        [(ngModel)]="newPassword">

    </div>

    <div class="mb-3">

      <label class="form-label">
        Confirm Password
      </label>

      <input
        type="password"
        class="form-control"
        [(ngModel)]="confirmPassword">

    </div>

    <button
      class="btn btn-primary"
      (click)="changePassword()">

      Change Password

    </button>

  </div>

</div>
