<div class="container-fluid bg-light py-5">

  <div class="container text-center">

    <h1 class="display-4">
      Making every day more special
    </h1>

    <p class="lead">
      One click away from your doorstep
    </p>

    <a
      routerLink="/shop"
      class="btn btn-success btn-lg">

      Shop Now

    </a>

  </div>

</div>

<div class="container mt-5">

  <h2 class="mb-4">
    Best Selling Flowers
  </h2>

  <div class="row">

    <div
      class="col-md-4 mb-4"
      *ngFor="let product of bestSellingProducts">

      <div class="card h-100">

        <img
          [src]="product.imageUrl"
          class="card-img-top"
          height="250">

        <div class="card-body">

          <h5>
            {{product.name}}
          </h5>

          <p>
            {{product.description}}
          </p>

          <a
            routerLink="/shop"
            class="btn btn-success">

            View Product

          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<div class="container mt-5">

  <h2 class="mb-4">
    New Arrivals
  </h2>

  <div class="row">

    <div
      class="col-md-4 mb-4"
      *ngFor="let product of newArrivalProducts">

      <div class="card h-100">

        <img
          [src]="product.imageUrl"
          class="card-img-top"
          height="250">

        <div class="card-body">

          <h5>
            {{product.name}}
          </h5>

          <p>
            {{product.description}}
          </p>

          <a
            routerLink="/shop"
            class="btn btn-primary">

            View Product

          </a>

        </div>

      </div>

    </div>

  </div>

</div>
