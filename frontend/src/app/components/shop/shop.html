<div class="container mt-4">

  <h2 class="mb-4">
    Flower Shop
  </h2>
  <div
  class="alert alert-success"
  *ngIf="successMessage">

  {{successMessage}}

</div>

  <div class="row mb-4">

    <div class="col-md-4">

      <select
        class="form-select"
        [(ngModel)]="selectedCategory"
        (change)="filterProducts()">

        <option value="">
          All Categories
        </option>

        <option value="BIRTHDAY">
          Birthday
        </option>

        <option value="LOVE">
          Love
        </option>

        <option value="MARRIAGE">
          Marriage
        </option>

        <option value="GRAND_OPENING">
          Grand Opening
        </option>

        <option value="SYMPATHY">
          Sympathy
        </option>

        <option value="GET_WELL_SOON">
          Get Well Soon
        </option>

      </select>

    </div>

    <div class="col-md-4">

      <input
        type="text"
        class="form-control"
        placeholder="Search flowers..."
        [(ngModel)]="searchText"
        (input)="filterProducts()">

    </div>

    <div class="col-md-4">

      <select
        class="form-select"
        [(ngModel)]="sortBy"
        (change)="filterProducts()">

        <option value="">
          Sort By
        </option>

        <option value="name">
          Name
        </option>

        <option value="priceLow">
          Price Low To High
        </option>

        <option value="priceHigh">
          Price High To Low
        </option>

      </select>

    </div>

  </div>

  <div class="row">

    <div
      class="col-md-4 mb-4"
      *ngFor="let product of filteredProducts">

      <div class="card h-100 shadow-sm">

        <img
          [src]="product.imageUrl"
          class="card-img-top"
          height="250">

        <div class="card-body">

          <h5>
            {{product.name}}
          </h5>

          <p>
            {{product.description}}
          </p>

          <p>
            <strong>
              Categories:
            </strong>

            {{product.categories?.join(', ')}}
          </p>

          <button
            class="btn btn-success"
            (click)="toggleProduct(product.id)">

            View Details

          </button>

          <div
            class="mt-3"
            *ngIf="expandedProductId===product.id">

           <h6 class="mt-3">
  Available Sizes
</h6>

<div
  class="form-check"
  *ngFor="let s of product.sizes">

  <input
    class="form-check-input"
    type="radio"
    [value]="s.size"
    [name]="'size'+product.id"
    [(ngModel)]="selectedSize"
(change)="getSelectedPrice(product)">

  <label class="form-check-label">

    {{s.size}}
    -
    ₹{{s.price}}

  </label>

</div>
<p
  class="mt-2 text-success"
  *ngIf="selectedPrice">

  Selected Price :
  ₹{{selectedPrice}}

</p>

            <label>
              Quantity
            </label>

            <input
              type="number"
              min="1"
              class="form-control mb-2"
              [(ngModel)]="quantity">

            <button
              class="btn btn-primary"
              (click)="addToCart(product)">

              Add To Cart

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
